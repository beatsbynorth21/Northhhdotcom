<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NORTHHH | Music Producer</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --black:#080808;
  --surface:#111;
  --border:rgba(255,255,255,0.07);
  --accent:#C8FF00;
  --muted:#666;
  --white:#F5F5F0;
  --display:'Bebas Neue',sans-serif;
  --body:'DM Sans',sans-serif;
}

body{
  background:var(--black);
  color:var(--white);
  font-family:var(--body);
  overflow-x:hidden;
  cursor:none;
}

/* CURSOR */
.cursor,.cursor-ring{
  position:fixed;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:9999;
}
.cursor{width:10px;height:10px;background:var(--accent);border-radius:50%;}
.cursor-ring{width:36px;height:36px;border:1px solid rgba(200,255,0,0.4);border-radius:50%;}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:24px 48px;
  background:rgba(8,8,8,0.6);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  z-index:100;
}

.nav-logo{font-family:var(--display);font-size:28px;letter-spacing:4px;text-decoration:none;color:#fff;}
.nav-logo span{color:var(--accent);}

.nav-links{display:flex;gap:30px;list-style:none;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:11px;letter-spacing:2px;}
.nav-links a:hover{color:var(--accent);}

.nav-cta{border:1px solid var(--accent);padding:10px 18px;color:var(--accent);text-decoration:none;font-size:11px;}

/* HERO */
#hero{
  min-height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  padding:0 48px;
}

h1{
  font-family:var(--display);
  font-size:110px;
  letter-spacing:6px;
}

.accent-line{color:var(--accent);display:block;}

.hero-desc{color:var(--muted);max-width:420px;margin:20px 0;}

.hero-visual{
  width:420px;height:520px;
  background:var(--surface);
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.vinyl{
  width:160px;height:160px;border-radius:50%;
  background:conic-gradient(#222,#111,#222);
  animation:spin 6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* REAL WAVEFORM */
.waveform{
  position:absolute;
  top:20px;right:20px;
  display:flex;
  align-items:flex-end;
  gap:3px;
  height:40px;
}

.waveform span{
  width:3px;
  height:10px;
  background:var(--accent);
  border-radius:2px;
  transition:height 0.1s ease;
}

/* CONNECT */
.platforms-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border:1px solid var(--border);
}

.platform-card{
  background:var(--black);
  padding:40px;
  text-decoration:none;
  color:#fff;
  transition:0.2s;
}
.platform-card:hover{background:#181818;}

.platform-name{font-family:var(--display);font-size:22px;}
.platform-handle{color:var(--muted);font-size:12px;}

/* BUTTON */
.toggle-btn{
  width:56px;height:56px;
  border-radius:50%;
  border:1px solid var(--border);
  background:var(--surface);
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a class="nav-logo">NORTH<span>HH</span></a>
  <ul class="nav-links">
    <li><a href="#connect">Connect</a></li>
  </ul>
  <a class="nav-cta" href="#connect">Book</a>
</nav>

<section id="hero">
  <div>
    <h1>NORTH<span class="accent-line">HHH.</span></h1>
    <p class="hero-desc">Hard emotional industry-ready beats.</p>
  </div>

  <div class="hero-visual">
    <div class="vinyl"></div>
    <div class="waveform" id="waveform"></div>
  </div>
</section>

<!-- AUDIO -->
<audio id="bg-music"></audio>

<button class="toggle-btn" onclick="toggleMusic()">▶</button>

<!-- CONNECT -->
<section>
  <div class="platforms-grid">

    <a class="platform-card" href="https://soundcloud.com/northhh" target="_blank">
      <div class="platform-name">SOUNDCLOUD</div>
    </a>

    <a class="platform-card" href="https://open.spotify.com" target="_blank">
      <div class="platform-name">SPOTIFY</div>
    </a>

    <a class="platform-card" href="https://audiomack.com/northhh" target="_blank">
      <div class="platform-name">AUDIOMACK</div>
    </a>

    <a class="platform-card" href="https://youtube.com/@northhh" target="_blank">
      <div class="platform-name">YOUTUBE</div>
    </a>

  </div>
</section>

<script>
/* CURSOR */
document.addEventListener("mousemove",(e)=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
  cursorRing.style.left=e.clientX+"px";
  cursorRing.style.top=e.clientY+"px";
});

/* WAVEFORM */
const waveform=document.getElementById("waveform");
const bars=[];

for(let i=0;i<24;i++){
  const s=document.createElement("span");
  waveform.appendChild(s);
  bars.push(s);
}

/* AUDIO ENGINE */
const playlist=[
  "beat1.mp3",
  "beat2.mp3",
  "beat3.mp3"
];

let currentTrack=0;
const audio=document.getElementById("bg-music");

let ctx,analyser,source,data;

function initAudio(){
  ctx=new (window.AudioContext||window.webkitAudioContext)();
  analyser=ctx.createAnalyser();
  source=ctx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(ctx.destination);
  analyser.fftSize=64;
  data=new Uint8Array(analyser.frequencyBinCount);
}

function loadTrack(i){
  audio.src=playlist[i];
}

/* AUTO NEXT */
audio.addEventListener("ended",()=>{
  currentTrack++;
  if(currentTrack>=playlist.length) currentTrack=0;
  loadTrack(currentTrack);
  audio.play();
});

/* WAVEFORM ANIMATE */
function animate(){
  requestAnimationFrame(animate);
  if(!analyser) return;

  analyser.getByteFrequencyData(data);

  for(let i=0;i<bars.length;i++){
    let v=data[i];
    bars[i].style.height=(v/2)+"px";
  }
}

/* PLAY */
function toggleMusic(){
  if(!ctx) initAudio();

  if(audio.paused){
    loadTrack(currentTrack);
    ctx.resume();
    audio.play();
    animate();
  } else {
    audio.pause();
  }
}
</script>

</body>
</html>
